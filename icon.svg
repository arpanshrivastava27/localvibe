<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient: Deep Night -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <!-- Heart/Pin Gradient: Vibrant Sunset -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF416C"/>
      <stop offset="100%" stop-color="#FF4B2B"/>
    </linearGradient>
    <filter id="dropGlow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#FF416C" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <!-- App Icon Base -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  
  <!-- Heart-shaped Map Pin -->
  <path d="M256,420 C256,420 120,270 120,170 C120,90 190,50 256,120 C322,50 392,90 392,170 C392,270 256,420 256,420 Z" fill="url(#heartGrad)" filter="url(#dropGlow)"/>
  
  <!-- "लो V" Text -->
  <text x="50%" y="46%" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="140" text-anchor="middle" dominant-baseline="central">
    <tspan fill="#ffffff">लो</tspan>
    <tspan fill="#ffffff" dx="5">V</tspan>
  </text>
</svg>
